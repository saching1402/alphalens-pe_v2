version: "3.9"

# Production compose — uses pre-built images from registry
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:16-alpine
    container_name: alphalens_db
    environment:
      POSTGRES_DB: alphalens
      POSTGRES_USER: alphalens
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphalens"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/${GITHUB_REPO}/alphalens-backend:latest
    container_name: alphalens_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://alphalens:${DB_PASSWORD}@db:5432/alphalens
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GITHUB_REPO}/alphalens-frontend:latest
    container_name: alphalens_frontend
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: alphalens_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
