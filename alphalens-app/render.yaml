services:
  - type: web
    name: alphalens-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: alphalens-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://alphalens-frontend.onrender.com
    healthCheckPath: /health

  - type: web
    name: alphalens-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    dockerContext: .
    buildArgs:
      - name: VITE_API_URL
        value: https://alphalens-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: alphalens-db
    databaseName: alphalens
    user: alphalens
    plan: free
