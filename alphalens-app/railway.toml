# railway.toml — Deploy FastAPI backend to Railway.app (free tier available)
# https://railway.app

[build]
  builder    = "DOCKERFILE"
  dockerfilePath = "backend/Dockerfile"

[deploy]
  startCommand  = "uvicorn main:app --host 0.0.0.0 --port $PORT"
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[healthcheck]
  path    = "/health"
  timeout = 30
