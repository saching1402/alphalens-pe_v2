# Netlify configuration for AlphaLens PE
# Frontend is deployed as a static site
# Backend API must be hosted separately (Railway, Render, or AWS)

[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Set VITE_API_URL in Netlify dashboard → Site Settings → Environment Variables
  # e.g. VITE_API_URL = https://alphalens-api.railway.app

[[redirects]]
  from   = "/api/*"
  to     = ":VITE_API_URL/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"
